<div class="container-md mt-4">

  <div class="row">

    <!-- COLONNA SINISTRA -->
    <div class="col-md-5">

      <!-- CARD INFO METEO -->
      <div class="card shadow-sm card-dark card-glow mb-3">
        <div class="card-body">

          <h3 class="card-title">Meteo Attuale</h3>

          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h1 class="display-5">{{ temperature }}°C</h1>
              <p class="text-muted">{{ condition }}</p>
            </div>

            <div>
              <p class="mb-1">Umidità: {{ humidity }}%</p>
              <p class="mb-1">Vento: {{ wind }} km/h</p>
              <p class="mb-0">Pressione: {{ pressure }} hPa</p>
            </div>
          </div>

        </div>
      </div>

      <!-- GRAFICO -->
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Andamento temperature</h5>
          <canvas id="tempChart"></canvas>
        </div>
      </div>

    </div>

    <!-- COLONNA DESTRA -->
    <!-- DESTRA: IMMAGINE STATICA -->
    <div class="col-md-7">

      <div class="card shadow-sm">
        <img src="http://vanzameteo.altervista.org/foicam/294e31d58d34c6b8/webcam.jpg?time=1782130015651"
          class="card-img-top" alt="Vanza live webcam">

        <div class="card-body text-center">
          <p class="text-muted mb-0">
            Vista rappresentativa del meteo attuale
          </p>
        </div>

      </div>
    </div>
  </div>

  </div>
